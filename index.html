<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>xFischx</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="game.js" defer></script>
  </head>

  <body>
    <!-- HUD -->
    <div id="hud">
      <div id="money">Money: 0</div>
      <div id="level">Level: 1</div>
      <div id="weather">Weather: Clear</div>
      <div id="rodName">Rod: Driftwood Rod</div>
    </div>

    <!-- Fishing UI (horizontal bar) -->
    <div id="fishingUI" class="hidden">
      <div id="fishBarContainerH">
        <div id="fishMarkerH"></div>
        <div id="catchZoneH"></div>
      </div>
      <div id="progressOuterH">
        <div id="progressInnerH"></div>
      </div>
    </div>

    <!-- 3D Scene -->
    <a-scene day-night-cycle="speed: 0.05">
      <!-- Lighting -->
      <a-entity light="type: ambient; intensity: 0.55; color: #ffffff"></a-entity>
      <a-entity id="sunLight" light="type: directional; intensity: 1.2; color: #ffffff" position="0 50 0"></a-entity>
      <a-entity id="moonLight" light="type: directional; intensity: 0.6; color: #cce0ff" position="0 -50 0"></a-entity>

      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- Water -->
      <a-entity geometry="primitive: plane; width: 500; height: 500"
                rotation="-90 0 0"
                material="color: #1e90ff; opacity: 0.8">
      </a-entity>

      <!-- Island (low-poly block) -->
      <a-entity geometry="primitive: box; width: 40; height: 2; depth: 40"
                position="0 -1 0"
                material="color: #4a7a3c">
      </a-entity>

      <!-- Fishing spot marker -->
      <a-entity id="fishingSpot" position="0 0 -10"
                geometry="primitive: circle; radius: 2"
                material="color: #00ffff; opacity: 0.4">
      </a-entity>

      <!-- Player -->
      <a-entity id="rig" position="0 1.6 5" wasd-controls="acceleration: 40">
        <a-entity id="camera" camera look-controls="pointerLockEnabled: true"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
